# Live DSCovoxNode (merger) configuration. Until this file existed, dscovox
# params were set only inline in scovox_multi_robot.launch.py /
# scovox_single_robot.launch.py and experiment-script CLI overrides — those
# still win when passed explicitly. Full per-param reference:
# default_params.yaml (DSCovoxNode section).
#
# Usage (namespace per robot — every robot runs its own merger):
#   ros2 run scovox_mapping dscovox_mapping_node --ros-args -r __ns:=/atlas \
#     --params-file <share>/scovox_mapping/config/dscovox_params.yaml
# The /** key matches the node in any robot namespace (a bare node-name key
# only matches the root namespace).
/**:
  ros__parameters:
    # ScovoxMapBinary delta streams to fuse (one per robot). Every robot runs
    # its own dscovox subscribing to ALL peers, so this list is fleet-wide.
    input_topics: ["/robot1/scovox_node/scovox_bin",
                   "/robot2/scovox_node/scovox_bin"]
    map_frame: "map"

    occupancy_vis_threshold: 0.7
    semantic_occ_gate: 0.5
    semantic_top_k: 2            # must match the senders' compile-time K_TOP

    publish_rate_hz: 1.0         # fused ScovoxMap topic (planner input) + viz
    pointcloud_min_interval_s: 0.1

    # Shared-ROI z-band (map frame, metres) — receive-side defensive clip of
    # the multi-robot share band; records outside it are dropped at ingest.
    # min >= max disables. KEEP IN SYNC with the sender band
    # (scovox_node share_roi_z_min/share_roi_z_max — set for real robots in
    # config/scovox_robot_share.yaml) and with the planner band
    # (explo_planner exploration_params.yaml roi_min_z/roi_max_z): the shared
    # band must be a SUPERSET of the planner band.
    share_roi_z_min: -0.5
    share_roi_z_max: 2.0
