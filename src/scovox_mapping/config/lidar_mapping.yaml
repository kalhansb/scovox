# =======================================================================
# SCovox — LiDAR geometry mapping (no semantics)
# =======================================================================
# Builds a Beta-occupancy voxel map from a LiDAR PointCloud2 stream. TSDF
# surface integration is off by default (enable_tsdf: false) — occupancy only.
# Semantic fusion is inactive: the input cloud carries no `semantic_label`
# field, so scovox_node integrates geometry / occupancy only. None of the
# Dirichlet / top-K / colour-map semantic parameters are set here.
#
# Load via:
#   ros2 launch scovox_mapping lidar_mapping.launch.py
# or stand-alone:
#   ros2 run scovox_mapping scovox_mapping_node \
#       --ros-args --params-file <path>/lidar_mapping.yaml
#
# The `/**` wildcard makes this file apply regardless of the node's
# namespace / name.
# =======================================================================

/**:
  ros__parameters:

    # --- Input -----------------------------------------------------------
    # A non-empty input_pointcloud_topic switches scovox_node into LiDAR
    # (PointCloud2) mode. The launch file's `pointcloud_topic` arg overrides
    # this value.
    input_pointcloud_topic: "/velodyne_points"

    # --- Voxel grid ------------------------------------------------------
    resolution: 0.10          # voxel edge length [m]
    inner_bits: 2             # Bonxai inner node = 2^2 = 4 blocks per side
    leaf_bits:  1             # leaf = 2^1 = 2 voxels per side (sparse outdoor LiDAR)

    # --- Occupancy (Beta) evidence weights -------------------------------
    # Sensor-physics defaults for a LiDAR time-of-flight sensor: very low
    # false-positive rate, highly trustworthy clear-air rays.
    #   w_occ  = (2*p_hit  - 1) / (1 - p_hit),   p_hit  ~ 0.90 -> 8.0
    #   w_free = 1/p_miss - 2,                   p_miss ~ 0.18 -> 4.0
    w_occ:  8.0
    w_free: 4.0

    # Free-space carving along each ray:
    #   <0 = full ray (classic occupancy clearing — set here)
    #    0 = endpoint only
    #   >0 = carve only a band of this length [m] in front of the hit
    carve_band: -1.0

    # --- TSDF surface integration ---------------------------------------
    # Master switch. false = occupancy only (no TSDF stored, computed, or
    # published). Set true (with sdf_trunc_voxels > 0) for the dense surface.
    enable_tsdf: false
    sdf_trunc_voxels: 3        # truncation in voxels; ignored while enable_tsdf=false
    tsdf_space_carving: false
    band_only_integration: false

    # --- Range gating ----------------------------------------------------
    min_range: 1.0                  # discard returns closer than this [m]
    max_range: 50.0                 # discard returns farther than this [m]
    range_decay_length: -1.0        # <=0 disables exponential range weighting
    grazing_angle_threshold: -1.0   # <=0 disables (not used for LiDAR)

    # --- Frames ----------------------------------------------------------
    base_frame:        "base_link"  # sensor / robot base frame
    integration_frame: "odom"       # fixed frame rays are integrated in
    map_frame:         "map"         # unused on the LiDAR path (outputs are
                                     # published in integration_frame); only
                                     # consumed once the 2-D planning grid is on

    # --- TF startup gate -------------------------------------------------
    startup_tf_stable_sec:     0.0   # start integrating immediately
    startup_tf_jump_threshold: 10.0  # tolerate fast platform motion at startup

    # --- Mode ------------------------------------------------------------
    # "persistent": single continuous local map, no inter-robot binary
    # publishing. Use "rolling" only for multi-robot dscovox fusion.
    mode: "persistent"
    dataset_mode: false

    # --- Outputs ---------------------------------------------------------
    # No publish_tsdf_pointcloud here: enable_tsdf is the single TSDF switch.
    publish_pointcloud:      true
    occupancy_vis_threshold: 0.6     # minimum p_occ for a voxel to be emitted
    scovox_publish_rate:     1.0     # full-map publish rate [Hz]
    pointcloud_topic:        "~/pointcloud"
    scovox_topic:            "~/scovox"

    # --- 2-D planning grid (occupancy projection) ------------------------
    # Off by default: publishPlanningMap rebuilds the whole grid per frame.
    # Set true (and add a subscriber) only if you need the 2-D nav grid.
    publish_planning_map:     false
    planning_map_topic:       "~/planning_map"
    planning_map_resolution:  0.20
    planning_map_size_m:      80.0
    planning_map_origin_x:   -40.0
    planning_map_origin_y:   -40.0
    planning_map_min_z:      -0.5
    planning_map_max_z:       2.0
    planning_map_inflation_m: 0.0
