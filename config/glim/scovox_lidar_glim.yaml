# =======================================================================
# SCovox — LiDAR occupancy mapping driven by GLIM SLAM (koide3/glim_ros2)
# =======================================================================
# Same geometry-only Beta-occupancy map as scovox_lidar_tree.yaml, but tuned for
# the TF tree produced by GLIM LiDAR-IMU SLAM instead of the NDT/ICP localizers.
#
# INPUT = GLIM's DESKEWED points (NOT raw /ouster/points). SCovox does NOT deskew;
# GLIM physically deskews every scan (per-point IMU motion compensation,
# odometry_estimation_imu.cpp:305-314), so we feed scovox GLIM's already-deskewed
# cloud /glim_ros/points (frame `imu`, ~11.6k pts/scan). PROVEN by a 3-way feed
# comparison (output/feed_cmp, full 3789-frame bag): raw /ouster/points gives a
# 7.2 m vertical smear (z/col med 31, IoU 0.07); /glim_ros/points collapses it to
# a 0.40 m thin surface (z/col med 2, acc 0.07 m, prec 99.7%, IoU 0.37) == GLIM.
# The smear was per-point intra-scan SKEW, not occupancy tuning and not pose drift
# (the loop-optimized /glim_ros/aligned_points_corrected adds almost nothing).
#
# GLIM (librviz_viewer.so) broadcasts:
#   map  -> odom              (loop-closure correction; JUMPS when a loop closes)
#   odom -> imu               (real-time odometry; smooth, drifts slowly)
#   imu  -> os_lidar          (static, from config_sensors.json T_lidar_imu)
#
# SCovox integrates each /glim_ros/points scan in `integration_frame` by looking up
# integration_frame -> cloud.header.frame_id (= imu). We integrate in `odom`: it is
# smooth/jump-free, so an ACCUMULATING voxel grid stays self-consistent (no
# loop-closure seams). odom drifts globally but slowly; on this bag it tracks `map`
# to within ~0.3 m. Alternative for a globally loop-closed map: feed
# /glim_ros/aligned_points_corrected (frame `map`) with integration_frame: "map"
# (base_frame stays `imu`) -- but already-integrated voxels do not retro-correct on
# a loop closure, so a seam can appear. The chain map->odom->imu is published by
# GLIM, so both resolve directly.
#
# Frame wiring (matches scripts/glim/run_glim_scovox*.sh):
#   input_pointcloud_topic = /glim_ros/points   (GLIM deskewed cloud)
#   cloud frame_id         = imu
#   base_frame             = imu                 (sensor/ray origin = imu position)
#   integration_frame      = odom                (GLIM smooth odometry frame)
#
# NOTE: /glim_ros/points is published RELIABLE (default QoS depth 10) and scovox
# subscribes RELIABLE -> they match directly; no QoS override is needed for scovox.
# The bag must still publish /ouster/points RELIABLE (config/ouster_reliable_qos.yaml)
# for GLIM's reliable sub. scovox's range gate is frame-agnostic ((Hp-O)^2 in the
# integration frame), so max_range caps true sensor range for the imu-frame cloud.
#
# Load via:
#   ros2 launch scovox_mapping lidar_mapping.launch.py \
#       params_file:=/ws/config/scovox_lidar_glim.yaml \
#       pointcloud_topic:=/glim_ros/points use_sim_time:=true
# =======================================================================

/**:
  ros__parameters:

    # --- Input -----------------------------------------------------------
    # GLIM's DESKEWED cloud (frame `imu`). scovox does not deskew -- GLIM does.
    input_pointcloud_topic: "/glim_ros/points"

    # --- Voxel grid ------------------------------------------------------
    # 0.10 m matches GLIM's downsampled deskewed /glim_ros/points feed (~10k pts/scan):
    # resolution sweep (output/res_sweep, scripts/glim/analyze_res.py) showed voxels
    # stay 98.7% backed by real GLIM points at 0.10 m (vs 99.5% @0.20, but 3x finer
    # detail and fewer footprint holes). 0.05 m over-resolves the feed (precision
    # 93.9% = ~6% unsupported voxels, 2.5x size, no gain).
    resolution: 0.10
    inner_bits: 2
    leaf_bits:  1

    # --- Occupancy (Beta) evidence weights -------------------------------
    w_occ:  8.0
    w_free: 4.0
    carve_band: -1.0          # full-ray free-space carving

    # --- TSDF ------------------------------------------------------------
    enable_tsdf: false        # occupancy only — fast, no dense surface
    sdf_trunc_voxels: 3
    tsdf_space_carving: false
    band_only_integration: false

    # --- Range gating (Ouster OS) ----------------------------------------
    min_range: 1.0            # drop near-field self returns
    max_range: 15.0           # cap occupancy integration at 15 m (tighter map, less CPU)
    range_decay_length: -1.0
    grazing_angle_threshold: -1.0

    # --- Frames (driven by GLIM SLAM) ------------------------------------
    base_frame:        "imu"        # ray origin = imu position (/glim_ros/points is in the imu frame)
    integration_frame: "odom"       # GLIM smooth/jump-free odometry frame (drifts globally; NO loop closure)
    map_frame:         "odom"       # unused on the LiDAR path; left for completeness

    # --- TF startup gate -------------------------------------------------
    # Wait briefly for GLIM's odom->imu TF to appear before integrating.
    startup_tf_stable_sec:     0.5
    startup_tf_jump_threshold: 10.0

    # --- TF runtime divergence gate --------------------------------------
    # DISABLED for GLIM. This gate was built to catch NDT pose *teleports*.
    # GLIM's odom frame is smooth and jump-free, so the gate is unnecessary; and
    # if integrating in GLIM's "map" frame, loop-closure corrections would be
    # wrongly rejected here as "divergence". Leave off for GLIM-driven mapping.
    runtime_tf_gate:           false
    runtime_tf_jump_threshold: 1.0

    # --- Localization reject gate ----------------------------------------
    # DISABLED for GLIM. This gate subscribes to the NDT localizer's
    # /alignment_status; GLIM publishes no such topic, so it must be off (else it
    # would block ALL integration waiting for a status that never arrives).
    reject_gate_enable:               false
    alignment_status_topic:           "/alignment_status"
    reject_gate_max_accepted_gap_sec: 0.5
    reject_gate_min_consecutive:      0

    # --- Mode ------------------------------------------------------------
    mode: "persistent"        # one continuous local map (single robot)
    dataset_mode: false

    # --- Outputs ---------------------------------------------------------
    publish_pointcloud:      true
    occupancy_vis_threshold: 0.6      # min p_occ for a voxel to be emitted
    scovox_publish_rate:     0.5      # full-map republish [Hz] (lighter for big map)
    pointcloud_topic:        "~/pointcloud"
    scovox_topic:            "~/scovox"

    # --- 2-D planning grid -----------------------------------------------
    publish_planning_map:     false
    planning_map_topic:       "~/planning_map"
    planning_map_resolution:  0.20
    planning_map_size_m:      80.0
    planning_map_origin_x:   -40.0
    planning_map_origin_y:   -40.0
    planning_map_min_z:      -0.5
    planning_map_max_z:       2.0
    planning_map_inflation_m: 0.0
