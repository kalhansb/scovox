# =======================================================================
# SCovox — LiDAR-ONLY geometric occupancy mapping (no RGB-D, no semantics)
# =======================================================================
# The LiDAR-only counterpart of scovox_fused_lidar_rgbd.yaml. ONE
# scovox_mapping_node consumes only the raw Ouster cloud and builds a Beta
# occupancy voxel map (occupied + free space) in the map frame. No camera, no
# segmentation, no Dirichlet semantics — fuse_lidar_rgbd is OFF, so the node
# runs its classic single-stream LiDAR path.
#
# Use this as the mapper BASE config for LiDAR-only distributed mapping; load
# the shared-robot overlay on top to turn it into a rolling sharer:
#   ros2 run scovox_mapping scovox_mapping_node --ros-args \
#     -r __ns:=/robot1 -r __node:=scovox_node \
#     --params-file /scovox/config/scovox_lidar_geometric.yaml \
#     --params-file /scovox/config/scovox_robot_share.yaml \
#     -p integration_frame:=r1_map
# See docs/distributed_mapping_lidar.md for the full runbook.
#
# Frames: map --NDT--> odom --EKF--> base_link --STATIC--> os_lidar. The
# localizer (hmr_localisation NDT vs the shared gt_map) owns map->odom, so every
# robot shares one global map frame and no cross-robot pose estimation is needed.
#
# IMPORTANT: run the IDENTICAL file on every robot. The merger pins the map's
# num_classes / dirichlet prior from the first stream it sees and drops any
# source whose prior differs — using one config fleet-wide keeps them matched
# (the Dirichlet substrate stays empty here, but its dimensions still travel on
# the wire).
# =======================================================================

/**:
  ros__parameters:
    use_sim_time: false                # live sensors; the share overlay also sets this

    # --- Single-stream LiDAR: fusion OFF -----------------------------------
    fuse_lidar_rgbd: false             # classic LiDAR path (no RGB-D subscription)

    # --- Input: RAW Ouster cloud, deskewed in-node -------------------------
    input_pointcloud_topic: "/ouster/points"   # frame os_lidar, carries per-point `t`
    imu_topic:              "/imu/data"         # gyro source for deskew
    dataset_mode: false

    # --- Frames ------------------------------------------------------------
    integration_frame: "map"           # SAME global frame as the NDT/gt map.
                                        # Set PER ROBOT (r1_map, r2_map, ...) from
                                        # the command line — see the share overlay.
    map_frame:  "map"
    base_frame: "os_lidar"             # LiDAR ray origin (classic path uses
                                        # base_frame as the sensor origin)

    # --- Occupancy (Beta) evidence weights ---------------------------------
    # LiDAR time-of-flight physics: trustworthy hits, trustworthy clear-air rays.
    w_occ:      8.0
    w_free:     4.0
    carve_band: -1.0                   # full-ray free-space carve — the planner
                                        # needs complete free space. A positive band
                                        # only carves near surfaces (far cheaper).

    # --- Voxel grid --------------------------------------------------------
    resolution: 0.10

    # --- Mode / geometry ---------------------------------------------------
    mode: "persistent"                 # the share overlay flips this to "rolling"
    enable_tsdf: false                 # occupancy only

    # --- Range gating (Ouster OS) ------------------------------------------
    min_range: 1.0
    max_range: 20.0
    range_decay_length:      -1.0      # <=0 disables range weighting
    grazing_angle_threshold: -1.0      # <=0 disables (LiDAR doesn't use it)

    # --- LiDAR per-scan conditioning ---------------------------------------
    deskew_mode:           "auto"      # deskew because /ouster/points has a `t` field
    downsample_voxel_size: 0.1         # uniform voxel-grid downsample per scan

    # --- TF placement timing -----------------------------------------------
    # Wait for the exact-stamp pose; drop the scan rather than integrate it at a
    # stale Time(0) fallback (which mis-places the whole scan → accumulation smear).
    tf_lookup_timeout_sec: 1.0
    tf_require_exact:      true

    # --- TF gates (off — NDT owns map->odom; no SLAM jump to guard against) --
    startup_tf_stable_sec:     0.0
    startup_tf_jump_threshold: 10.0
    runtime_tf_gate:           false
