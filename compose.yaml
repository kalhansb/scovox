# ---------------------------------------------------------------------------
# SCovox standalone dev / run container (ROS 2 Jazzy).
#
# Independent of the hmr_localisation image — scovox builds, tests, and runs on
# its own (see docker/Dockerfile). This compose file gives you a *persistent*
# container to exec into, instead of the throwaway `docker run --rm` flow in
# docker/build_and_test.sh.
#
# The workspace is bind-mounted at /scovox, so build/install/log land in the
# repo (git-ignored) and host-side edits are picked up with no image rebuild.
#
# Usage:
#   docker compose up -d                       # start (reuses scovox:jazzy if built)
#   docker compose up -d --build               # rebuild the image first
#   docker compose exec scovox bash            # interactive shell (ROS auto-sourced)
#   docker compose exec scovox \
#       bash -lc 'colcon build --cmake-args -DCMAKE_BUILD_TYPE=Release'
#   docker compose exec scovox \
#       bash -lc 'colcon test && colcon test-result --all'
#   docker compose down                        # stop + remove the container
# ---------------------------------------------------------------------------
services:
  scovox:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: scovox:jazzy
    container_name: scovox
    # Host networking + IPC: trivial DDS discovery and X11 (RViz) on one machine.
    network_mode: host
    ipc: host
    # NVIDIA GPU passthrough so in-container RViz renders on the discrete GPU
    # (hardware GL), not Mesa/llvmpipe. Host default-runtime is already nvidia,
    # but request it explicitly (mirrors glim_localisation/compose.yaml). On this
    # PRIME/Optimus laptop the RViz launch must also export
    # __NV_PRIME_RENDER_OFFLOAD=1 + __GLX_VENDOR_LIBRARY_NAME=nvidia (see
    # run_fused_experiment.sh); DRIVER_CAPABILITIES=all pulls in the GLX libs.
    runtime: nvidia
    gpus: all
    environment:
      - DISPLAY=${DISPLAY:-}
      - QT_X11_NO_MITSHM=1
      - RCUTILS_COLORIZED_OUTPUT=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      # Keep DDS discovery on loopback. Do NOT set the deprecated
      # ROS_LOCALHOST_ONLY — under FastDDS here it breaks multicast participant
      # discovery (matches the hmr_localisation compose note).
      - ROS_AUTOMATIC_DISCOVERY_RANGE=LOCALHOST
    volumes:
      - ./:/scovox                       # workspace (build/install/log are git-ignored)
      - ../../../bags:/scovox/bags:rw    # rosbags at HMR_Explo/bags (3 levels up from ws/src/scovox)
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    working_dir: /scovox
    stdin_open: true
    tty: true
    command: bash
